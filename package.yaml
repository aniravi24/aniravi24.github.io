name:                aniravi24-github-io
version:             0.1.0.0
github:              "aniravi24/aniravi24.github.io"
license:             BSD3
author:              "Ani Ravi"
maintainer:          ""
copyright:           "2021 Ani Ravi"

extra-source-files:
- README.md
- ChangeLog.md

synopsis:            My site built with slick!
category:            Slick-Site

description: My slick Site

executables:
  build-site:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall
    dependencies:
    - base >= 4.7 && < 5
    - shake
    - slick
    - text
    - containers
    - unordered-containers
    - lens
    - aeson
    - lens-aeson
    - time
